<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f1115" media="(prefers-color-scheme: dark)">
<title>Cards</title>
<style>
  /* ===== Theme tokens ===== */
  :root{
    --bg:#f6f7f9; --surface:#ffffff; --surface-2:#eef0f3; --text:#1c1e21; --muted:#6b7280;
    --border:#e5e7eb; --accent:#4f46e5; --accent-press:#4338ca;
    --again:#ef4444; --hard:#f59e0b; --good:#10b981; --easy:#3b82f6;
    --radius:16px; --radius-sm:11px; --tap:48px;
    --shadow:0 1px 3px rgba(17,24,39,.07),0 1px 2px rgba(17,24,39,.04);
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0f1115; --surface:#1a1d23; --surface-2:#242832; --text:#e8eaef; --muted:#9aa3b2;
      --border:#2a2f3a; --accent:#6d6af0; --accent-press:#8b88f5;
      --again:#f05252; --hard:#f7a83a; --good:#23c08a; --easy:#5096f5;
      --shadow:0 1px 3px rgba(0,0,0,.45);
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; font-size:16px;
  }
  button,input,textarea{font-family:inherit}
  button{cursor:pointer; -webkit-tap-highlight-color:transparent; touch-action:manipulation; color:inherit}

  #app{
    max-width:520px; margin:0 auto; min-height:100dvh;
    display:flex; flex-direction:column; background:var(--bg); position:relative;
  }
  /* ===== Top bar ===== */
  #topbar{
    position:sticky; top:0; z-index:10; display:flex; align-items:center; gap:6px;
    padding:8px 10px; padding-top:calc(8px + env(safe-area-inset-top));
    background:var(--bg); border-bottom:1px solid var(--border); min-height:54px;
  }
  .tb-title{flex:1; text-align:center; font-weight:650; font-size:17px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .tb-btn{width:42px;height:42px;border:none;background:none;color:var(--accent);font-size:24px;line-height:1;border-radius:10px;display:flex;align-items:center;justify-content:center}
  .tb-btn.tb-action{font-size:26px}
  .tb-btn:active{background:var(--surface-2)}
  .tb-spacer{width:42px;flex:0 0 auto}

  /* ===== Screen + nav ===== */
  #screen{flex:1; overflow-y:auto; padding:14px; padding-bottom:24px; -webkit-overflow-scrolling:touch; overscroll-behavior-y:contain}
  #bottomnav{display:flex; border-top:1px solid var(--border); background:var(--surface); position:sticky; bottom:0; padding-bottom:env(safe-area-inset-bottom)}
  .nav-item{flex:1;border:none;background:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 9px;font-size:11px;font-weight:600;min-height:var(--tap)}
  .nav-item .ni-ic{font-size:20px;line-height:1}
  .nav-item.active{color:var(--accent)}

  /* ===== Buttons ===== */
  .primary{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:600;min-height:var(--tap);padding:0 18px}
  .primary:active{background:var(--accent-press)}
  .primary:disabled{opacity:.45}
  .secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);min-height:var(--tap);font-size:15px;font-weight:600;padding:0 16px}
  .secondary:active{background:var(--surface-2)}
  .ghost{background:none;border:none;color:var(--accent);font-size:15px;min-height:40px;padding:0 10px;border-radius:9px;font-weight:600}
  .ghost:active{background:var(--surface-2)}
  .ghost.sm{font-size:13px;min-height:36px;padding:0 8px}
  .ghost.danger{color:var(--again)}
  .danger-solid{background:var(--again);color:#fff;border:none;border-radius:var(--radius-sm);min-height:var(--tap);font-weight:600;font-size:15px}
  .danger-solid:active{filter:brightness(.92)}
  .block{display:block;width:100%;margin-top:10px}
  .big{min-height:54px;font-size:17px}

  /* ===== Deck list ===== */
  .deck-list{display:flex;flex-direction:column;gap:10px}
  .deck-card{display:flex;align-items:center;gap:12px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;text-align:left;box-shadow:var(--shadow);transition:transform .08s}
  .deck-card:active{transform:scale(.985)}
  .dc-main{flex:1;min-width:0}
  .dc-name{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dc-sub{color:var(--muted);font-size:13px;margin-top:3px}
  .dc-due{min-width:36px;height:36px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;background:var(--surface-2);color:var(--muted);padding:0 9px;flex-shrink:0}
  .dc-due.has{background:var(--accent);color:#fff}

  /* ===== Deck detail ===== */
  .deck-actions{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
  .deck-counts{font-size:14px;color:var(--muted)}
  .deck-counts b{color:var(--text);font-size:17px}
  .mini-actions{display:flex;gap:2px}
  .card-list{display:flex;flex-direction:column;gap:8px;margin-top:16px}
  .card-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 6px 6px 12px}
  .cr-main{flex:1;min-width:0;display:flex;align-items:center;gap:8px;min-height:40px}
  .cr-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:15px}
  .cr-text em{color:var(--muted)}
  .badge{font-size:9px;font-weight:800;letter-spacing:.4px;padding:3px 5px;border-radius:5px;background:var(--surface-2);color:var(--muted);flex-shrink:0}
  .badge.cloze{background:color-mix(in srgb,var(--accent) 16%,transparent);color:var(--accent)}
  .cr-due{font-size:11px;color:var(--muted);flex-shrink:0}
  .icon-btn{width:36px;height:36px;border:none;background:none;color:var(--muted);font-size:15px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .icon-btn:active{background:var(--surface-2);color:var(--again)}

  /* ===== Editor ===== */
  .editor{display:flex;flex-direction:column;gap:12px}
  .seg{display:flex;background:var(--surface-2);border-radius:11px;padding:3px}
  .seg-btn{flex:1;border:none;background:none;color:var(--muted);min-height:40px;border-radius:8px;font-weight:600;font-size:14px}
  .seg-btn.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
  .fields-standard,.fields-cloze{display:flex;flex-direction:column;gap:10px}
  .fields-cloze .ghost.sm{align-self:flex-start}
  .inp{width:100%;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:11px;padding:12px;font-size:16px;resize:vertical;line-height:1.45}
  .inp:focus{outline:none;border-color:var(--accent)}
  .cloze-input{font-variant-ligatures:none}
  .hint{font-size:12px;color:var(--muted);line-height:1.45}
  .hint.center{text-align:center;margin-top:6px}
  .editor-bar{position:sticky;bottom:0;display:flex;gap:8px;padding:14px 0 calc(12px + env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--bg) 35%);margin-top:6px}
  .editor-bar .primary,.editor-bar .secondary{flex:1}
  .editor-bar .ghost{flex:0 0 auto}

  /* ===== Review ===== */
  .review{display:flex;flex-direction:column;gap:10px;padding-top:2px}
  .progress{height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden}
  .progress .bar{height:100%;background:var(--accent);transition:width .25s;border-radius:3px}
  .rev-meta{font-size:12px;color:var(--muted);text-align:center}
  .rev-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 18px;min-height:44vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:10px}
  .rev-prompt{font-size:24px;line-height:1.45;font-weight:500}
  .rev-answer-body{font-size:22px;line-height:1.45}
  .rev-divider{width:64px;height:2px;background:var(--border);margin:14px auto}
  .rev-hint{font-size:12px;color:var(--muted);margin-top:6px}
  .cloze-blank{color:var(--accent);font-weight:700;border-bottom:2px solid var(--accent);padding:0 5px;border-radius:2px}
  .cloze-answer{color:var(--accent);font-weight:700}
  .grade-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px;padding-bottom:env(safe-area-inset-bottom)}
  .grade-btn{border:none;border-radius:13px;color:#fff;min-height:62px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-weight:600}
  .grade-btn .gl{font-size:14px}
  .grade-btn .gi{font-size:11px;opacity:.9;font-weight:500}
  .grade-btn:active{filter:brightness(.9)}
  .grade-btn.again{background:var(--again)} .grade-btn.hard{background:var(--hard)}
  .grade-btn.good{background:var(--good)} .grade-btn.easy{background:var(--easy)}

  /* ===== Done / empty / not-found ===== */
  .done,.empty{text-align:center;padding:52px 24px;display:flex;flex-direction:column;align-items:center;gap:8px}
  .done-emoji{width:64px;height:64px;border-radius:32px;background:var(--good);color:#fff;display:flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:6px}
  .done-title,.empty-title{font-size:19px;font-weight:700}
  .done-sub,.empty-sub{color:var(--muted);font-size:14px;max-width:280px;line-height:1.45}
  .done .primary,.empty .primary{margin-top:16px;padding:0 26px}

  /* ===== Settings ===== */
  .settings{display:flex;flex-direction:column;gap:10px}
  .stat-row{display:flex;gap:10px;margin-bottom:6px}
  .stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 6px;text-align:center}
  .stat b{display:block;font-size:23px}
  .stat span{font-size:12px;color:var(--muted)}

  /* ===== Modal sheet ===== */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:flex-end;justify-content:center;z-index:100;animation:fade .15s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{width:100%;max-width:520px;background:var(--surface);border-radius:20px 20px 0 0;padding:20px 18px calc(18px + env(safe-area-inset-bottom));animation:slideup .2s ease}
  @keyframes slideup{from{transform:translateY(28px)}to{transform:translateY(0)}}
  .sheet-title{font-size:17px;font-weight:650;margin-bottom:4px}
  .sheet-msg{font-size:14px;color:var(--muted);margin:6px 0 14px;line-height:1.45}
  .sheet-input{width:100%;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:10px;padding:13px;font-size:16px;margin:10px 0 14px}
  .sheet-input:focus{outline:none;border-color:var(--accent)}
  .sheet-actions{display:flex;gap:8px}
  .sheet-actions button{flex:1;min-height:46px}

  /* ===== Toast ===== */
  #toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(16px);background:#111827;color:#fff;padding:11px 18px;border-radius:22px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:200;max-width:88%;box-shadow:0 6px 20px rgba(0,0,0,.25)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <header id="topbar"></header>
  <main id="screen"></main>
  <nav id="bottomnav"></nav>
</div>
<div id="toast" role="status" aria-live="polite"></div>

<script>
/* ============================================================================
 * SPACED REPETITION FLASHCARDS — single-file, offline, IndexedDB-backed.
 *
 * DATA MODEL (IndexedDB "srs-flashcards", schema v1)
 *   decks   { id, name, createdAt, updatedAt }
 *   cards   { id, deckId, type:'standard'|'cloze',
 *             front, back,            // standard
 *             text,                   // cloze source incl. {{c1::answer::hint}}
 *             createdAt, updatedAt }
 *   items   { id, cardId, deckId,     // the SCHEDULING unit
 *             clozeIndex,             // null for standard, 1..n for each cloze
 *             due, interval(min), ease, reps, lapses, step, state,
 *             lastReviewed, lapsedInterval }
 *           indexes: deckId, cardId, due
 *   reviews { id, itemId, cardId, deckId, grade, at, before, after }
 *           indexes: itemId, deckId   (review history)
 *
 * One standard card -> one item. One cloze card -> one item per distinct cNN.
 * Editing a cloze reconciles items: add new indices, drop removed ones, keep
 * the rest WITH their schedule -> no duplicate review items.
 *
 * SCHEDULING (SM-2 inspired, interval stored in minutes)
 *   states: new -> learning -> review ; review --(Again)--> relearning -> review
 *   learning steps [1m,10m]; relearn step [10m]; graduate Good=1d, Easy=4d.
 *   review: Again -> lapse, ease-0.2, relearn (remembers ~half interval)
 *           Hard  -> ease-0.15, interval*1.2
 *           Good  -> interval*ease
 *           Easy  -> ease+0.15, interval*ease*1.3
 *   ease clamped >=1.3. Tracks due, interval, ease, reps, lapses, lastReviewed.
 *
 * NAVIGATION: hash routing is the source of truth (reload/back/bookmark safe).
 *   #/decks  #/deck/:id  #/deck/:id/new-card  #/deck/:id/card/:cid/edit
 *   #/deck/:id/review  #/deck/:id/review/today  #/settings
 * ==========================================================================*/

'use strict';

/* ---------- constants ---------- */
const DB_NAME = 'srs-flashcards', DB_VERSION = 1;
const MIN = 1, HOUR = 60, DAY = 1440;
const LEARNING_STEPS = [1, 10];      // minutes
const RELEARN_STEPS  = [10];
const GRAD_GOOD = 1 * DAY, GRAD_EASY = 4 * DAY;
const MIN_EASE = 1.3, START_EASE = 2.5, EASY_BONUS = 1.3, HARD_MULT = 1.2;

/* ---------- tiny utils ---------- */
const uid = () => (crypto.randomUUID ? crypto.randomUUID()
  : 'id-' + Date.now().toString(36) + '-' + Math.random().toString(16).slice(2));
const esc = s => (s == null ? '' : String(s)).replace(/[&<>"']/g,
  c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
const elFromHtml = h => { const d = document.createElement('div'); d.innerHTML = h.trim(); return d.firstElementChild; };
const $screen = () => document.getElementById('screen');
const $top = () => document.getElementById('topbar');
const $nav = () => document.getElementById('bottomnav');

function fmtInt(min){
  if (min < 1) return '<1m';
  if (min < HOUR) return Math.round(min) + 'm';
  if (min < DAY) return Math.round(min / HOUR) + 'h';
  if (min < DAY * 30) return Math.round(min / DAY) + 'd';
  if (min < DAY * 365) return Math.round(min / DAY / 30) + 'mo';
  return (min / DAY / 365).toFixed(1) + 'y';
}

let _toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ---------- IndexedDB layer ---------- */
let _dbPromise;
function openDB(){
  if (_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains('decks'))
        db.createObjectStore('decks', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('cards')) {
        const s = db.createObjectStore('cards', { keyPath: 'id' });
        s.createIndex('deckId', 'deckId', { unique: false });
      }
      if (!db.objectStoreNames.contains('items')) {
        const s = db.createObjectStore('items', { keyPath: 'id' });
        s.createIndex('deckId', 'deckId', { unique: false });
        s.createIndex('cardId', 'cardId', { unique: false });
        s.createIndex('due', 'due', { unique: false });
      }
      if (!db.objectStoreNames.contains('reviews')) {
        const s = db.createObjectStore('reviews', { keyPath: 'id' });
        s.createIndex('itemId', 'itemId', { unique: false });
        s.createIndex('deckId', 'deckId', { unique: false });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return _dbPromise;
}
const reqProm = req => new Promise((res, rej) => { req.onsuccess = () => res(req.result); req.onerror = () => rej(req.error); });
const txDone = t => new Promise((res, rej) => { t.oncomplete = () => res(); t.onerror = () => rej(t.error); t.onabort = () => rej(t.error); });
async function tx(store, mode){ const db = await openDB(); return db.transaction(store, mode); }
async function getAll(store){ const t = await tx(store, 'readonly'); return reqProm(t.objectStore(store).getAll()); }
async function dbGet(store, key){ const t = await tx(store, 'readonly'); return reqProm(t.objectStore(store).get(key)); }
async function dbPut(store, val){ const t = await tx(store, 'readwrite'); await reqProm(t.objectStore(store).put(val)); return val; }
async function dbDelete(store, key){ const t = await tx(store, 'readwrite'); await reqProm(t.objectStore(store).delete(key)); }
async function getByIndex(store, index, key){ const t = await tx(store, 'readonly'); return reqProm(t.objectStore(store).index(index).getAll(key)); }
async function clearStore(store){ const t = await tx(store, 'readwrite'); await reqProm(t.objectStore(store).clear()); }
async function clearAll(){ for (const s of ['decks','cards','items','reviews']) await clearStore(s); }

/* ---------- cloze parsing ---------- */
const CLOZE_RE = /\{\{c(\d+)::([\s\S]*?)\}\}/g;
function parseCloze(text){
  const set = new Set(); let m;
  CLOZE_RE.lastIndex = 0;
  while ((m = CLOZE_RE.exec(text || ''))) set.add(parseInt(m[1], 10));
  return [...set].sort((a, b) => a - b);
}
function clozePlain(text){
  return (text || '').replace(CLOZE_RE, (_, __, inner) => inner.split('::')[0]);
}
function renderCloze(text, target, reveal){
  const out = esc(text).replace(CLOZE_RE, (_, idx, content) => {
    const n = parseInt(idx, 10);
    const [answer, hint] = content.split('::');
    if (n === target)
      return reveal ? `<span class="cloze-answer">${answer}</span>`
                    : `<span class="cloze-blank">[${hint ? hint : '&hellip;'}]</span>`;
    return answer; // other clozes shown normally
  });
  return out.replace(/\n/g, '<br>');
}

/* ---------- scheduler ---------- */
function newItem(card, clozeIndex){
  return { id: uid(), cardId: card.id, deckId: card.deckId, clozeIndex,
    due: Date.now(), interval: 0, ease: START_EASE, reps: 0, lapses: 0,
    step: 0, state: 'new', lastReviewed: null, lapsedInterval: 0 };
}
// Returns a NEW item object with updated schedule for the given grade.
function schedule(src, grade, now){
  const it = { ...src };
  let { state = 'new', step = 0, ease = START_EASE, interval = 0, lapses = 0, lapsedInterval = 0 } = it;
  ease = ease || START_EASE;

  if (state === 'new' || state === 'learning') {
    state = 'learning';
    if (grade === 'again')      { step = 0; interval = LEARNING_STEPS[0]; }
    else if (grade === 'hard')  { interval = LEARNING_STEPS[Math.min(step, LEARNING_STEPS.length - 1)]; }
    else if (grade === 'good')  {
      if (step + 1 < LEARNING_STEPS.length) { step += 1; interval = LEARNING_STEPS[step]; }
      else { state = 'review'; interval = GRAD_GOOD; }
    } else { state = 'review'; interval = GRAD_EASY; }       // easy
  } else if (state === 'relearning') {
    if (grade === 'again')      { step = 0; interval = RELEARN_STEPS[0]; }
    else if (grade === 'hard')  { interval = RELEARN_STEPS[Math.min(step, RELEARN_STEPS.length - 1)]; }
    else if (grade === 'good')  {
      if (step + 1 < RELEARN_STEPS.length) { step += 1; interval = RELEARN_STEPS[step]; }
      else { state = 'review'; interval = Math.max(DAY, lapsedInterval || DAY); }
    } else { state = 'review'; interval = Math.max(DAY, lapsedInterval || DAY) * 2; } // easy
  } else { // review
    if (grade === 'again') {
      lapses += 1; ease = Math.max(MIN_EASE, ease - 0.2);
      lapsedInterval = Math.max(DAY, Math.round(interval * 0.5));
      state = 'relearning'; step = 0; interval = RELEARN_STEPS[0];
    } else if (grade === 'hard') {
      ease = Math.max(MIN_EASE, ease - 0.15);
      interval = Math.max(interval + 1, Math.round(interval * HARD_MULT));
    } else if (grade === 'good') {
      interval = Math.max(interval + 1, Math.round(interval * ease));
    } else { // easy
      ease = ease + 0.15;
      interval = Math.max(interval + 1, Math.round(interval * ease * EASY_BONUS));
    }
  }
  return { ...it, state, step, ease, interval, lapses, lapsedInterval,
    reps: (it.reps || 0) + 1, due: now + interval * 60000, lastReviewed: now };
}

/* ---------- item reconciliation (avoids duplicate cloze items) ---------- */
async function syncItems(card){
  const existing = await getByIndex('items', 'cardId', card.id);
  if (card.type === 'standard') {
    if (!existing.some(i => i.clozeIndex == null)) await dbPut('items', newItem(card, null));
    for (const it of existing) if (it.clozeIndex != null) await dbDelete('items', it.id);
  } else {
    const indices = parseCloze(card.text);
    const have = new Set(existing.filter(i => i.clozeIndex != null).map(i => i.clozeIndex));
    for (const idx of indices) if (!have.has(idx)) await dbPut('items', newItem(card, idx));
    for (const it of existing) {
      if (it.clozeIndex == null || !indices.includes(it.clozeIndex)) await dbDelete('items', it.id);
    }
  }
}

/* ---------- cascading deletes ---------- */
async function deleteCard(cardId){
  const items = await getByIndex('items', 'cardId', cardId);
  for (const it of items) await dbDelete('items', it.id);
  await dbDelete('cards', cardId);
}
async function deleteDeck(deckId){
  for (const c of await getByIndex('cards', 'deckId', deckId)) await dbDelete('cards', c.id);
  for (const it of await getByIndex('items', 'deckId', deckId)) await dbDelete('items', it.id);
  for (const r of await getByIndex('reviews', 'deckId', deckId)) await dbDelete('reviews', r.id);
  await dbDelete('decks', deckId);
}

/* ---------- export / import ---------- */
async function exportData(){
  const [decks, cards, items, reviews] = await Promise.all(
    ['decks','cards','items','reviews'].map(getAll));
  return { schema: DB_VERSION, app: 'srs-flashcards', exportedAt: new Date().toISOString(),
    decks, cards, items, reviews };
}
async function importData(data){
  await clearAll();
  const put = async (store, arr) => {
    if (!Array.isArray(arr)) return;
    const t = await tx(store, 'readwrite'); const os = t.objectStore(store);
    for (const o of arr) os.put(o);
    await txDone(t);
  };
  await put('decks', data.decks);
  await put('cards', data.cards);
  await put('items', data.items);
  await put('reviews', data.reviews);
}

/* ============================ ROUTING ============================ */
function parseRoute(){
  const h = location.hash.replace(/^#/, '');
  const parts = h.split('/').filter(Boolean);
  if (!parts.length || parts[0] === 'decks') return { name: 'decks' };
  if (parts[0] === 'settings') return { name: 'settings' };
  if (parts[0] === 'deck' && parts[1]) {
    const deckId = parts[1];
    if (!parts[2]) return { name: 'deck', deckId };
    if (parts[2] === 'new-card') return { name: 'editor', deckId, cardId: null };
    if (parts[2] === 'card' && parts[3] && parts[4] === 'edit')
      return { name: 'editor', deckId, cardId: parts[3] };
    if (parts[2] === 'review')
      return { name: 'review', deckId, mode: parts[3] === 'today' ? 'today' : 'all' };
  }
  return { name: 'notfound' };
}
const go = path => { if (location.hash === '#' + path) render(); else location.hash = path; };

/* ============================ MODALS ============================ */
function showConfirm({ title, message = '', ok = 'OK', danger = false }){
  return new Promise(resolve => {
    const ov = elFromHtml(`<div class="overlay"><div class="sheet">
      <div class="sheet-title">${esc(title)}</div>
      ${message ? `<div class="sheet-msg">${esc(message)}</div>` : ''}
      <div class="sheet-actions">
        <button class="secondary" data-cancel>Cancel</button>
        <button class="${danger ? 'danger-solid' : 'primary'}" data-ok>${esc(ok)}</button>
      </div></div></div>`);
    document.body.appendChild(ov);
    const close = v => { ov.remove(); resolve(v); };
    ov.querySelector('[data-cancel]').onclick = () => close(false);
    ov.querySelector('[data-ok]').onclick = () => close(true);
    ov.addEventListener('click', e => { if (e.target === ov) close(false); });
  });
}
function showPrompt({ title, value = '', placeholder = '', ok = 'OK' }){
  return new Promise(resolve => {
    const ov = elFromHtml(`<div class="overlay"><div class="sheet">
      <div class="sheet-title">${esc(title)}</div>
      <input class="sheet-input" type="text" value="${esc(value)}" placeholder="${esc(placeholder)}"
        autocapitalize="sentences" autocomplete="off">
      <div class="sheet-actions">
        <button class="secondary" data-cancel>Cancel</button>
        <button class="primary" data-ok>${esc(ok)}</button>
      </div></div></div>`);
    document.body.appendChild(ov);
    const inp = ov.querySelector('input');
    const close = v => { ov.remove(); resolve(v); };
    ov.querySelector('[data-cancel]').onclick = () => close(null);
    ov.querySelector('[data-ok]').onclick = () => close(inp.value);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); close(inp.value); }
      else if (e.key === 'Escape') close(null);
    });
    ov.addEventListener('click', e => { if (e.target === ov) close(null); });
    setTimeout(() => { inp.focus(); inp.select(); }, 50);
  });
}

async function screenEditor(deckId, cardId){

        <button class="ghost sm" data-cloze-btn>{{&nbsp;}} Make cloze</button>

      </div>
    </div>

      <button class="ghost" data-cancel>Cancel</button>
      ${cardId ? '' : '<button class="secondary" data-save-add>Save &amp; new</button>'}
      <button class="primary" data-save>Save</button>
    </div>`;

  s.querySelectorAll('[data-type]').forEach(b => b.onclick = () => {
    type = b.dataset.type;
    s.querySelectorAll('[data-type]').forEach(x => x.classList.toggle('on', x.dataset.type === type));
    s.querySelector('.fields-standard').hidden = type !== 'standard';
    s.querySelector('.fields-cloze').hidden = type !== 'cloze';
    setTimeout(() => (type === 'cloze' ? s.querySelector('[data-text]') : s.querySelector('[data-front]')).focus(), 10);
  });
  s.querySelector('[data-cloze-btn]').onclick = () => wrapCloze(s.querySelector('[data-text]'));
  s.querySelector('[data-cancel]').onclick = () => go('/deck/' + deckId);

  const save = async again => {
    const front = s.querySelector('[data-front]').value;
    const back  = s.querySelector('[data-back]').value;
    const text  = s.querySelector('[data-text]').value;
    if (type === 'standard') {
      if (!front.trim() || !back.trim()) { toast('Front and back required'); return; }
    } else if (parseCloze(text).length < 1) {
      toast('Add at least one {{c1::…}}'); return;
    }
    if (card) {
      Object.assign(card, { type, front, back, text, updatedAt: Date.now() });
      await dbPut('cards', card); await syncItems(card);
      toast('Saved'); go('/deck/' + deckId);

  setTimeout(() => (type === 'cloze' ? s.querySelector('[data-text]') : s.querySelector('[data-front]')) ?.focus(), 60);
}
function wrapCloze(ta){
  const v = ta.value, a = ta.selectionStart, b = ta.selectionEnd;
  const existing = parseCloze(v);
  const n = (existing.length ? Math.max(...existing) : 0) + 1;
  const sel = v.slice(a, b) || 'answer';
  const ins = `{{c${n}::${sel}}}`;
  ta.value = v.slice(0, a) + ins + v.slice(b);
  const pos = a + ins.length;
  ta.focus(); ta.setSelectionRange(pos, pos);
}

/* --- Review --- */
let session = null; // { deckId, mode, queue:[itemId], reviewed, view }

async function buildSession(deckId, mode){
  const now = Date.now();
  const due = (await getByIndex('items', 'deckId', deckId))
    .filter(i => i.due <= now)
    .sort((a, b) => a.due - b.due);
  return { deckId, mode, queue: due.map(i => i.id), reviewed: 0, view: null };
}
async function screenReview(deckId, mode){
  const deck = await dbGet('decks', deckId);
  if (!deck) return screenNotFound();
  if (!session || session.deckId !== deckId || session.mode !== mode)
    session = await buildSession(deckId, mode);

  setNav(null);
  if (!session.queue.length) return renderReviewDone(deck);

  const item = await dbGet('items', session.queue[0]);
  if (!item) { session.queue.shift(); return screenReview(deckId, mode); }
  const card = await dbGet('cards', item.cardId);
  if (!card) { session.queue.shift(); await dbDelete('items', item.id); return screenReview(deckId, mode); }
  renderReviewCard(deck, item, card);
}
function renderReviewCard(deck, item, card){
  const remaining = session.queue.length, done = session.reviewed;
  const pct = Math.round(done / (done + remaining || 1) * 100);
  setTopbar({ title: '', back: '/deck/' + deck.id });

  let promptHtml, answerHtml;
  if (card.type === 'cloze') {
    promptHtml = renderCloze(card.text, item.clozeIndex, false);
    answerHtml = renderCloze(card.text, item.clozeIndex, true);
  } else {
    promptHtml = esc(card.front).replace(/\n/g, '<br>');
    answerHtml = esc(card.back).replace(/\n/g, '<br>');
  }
  const gradeBtn = g => {
    const prev = schedule(item, g, Date.now());
    const label = { again: 'Again', hard: 'Hard', good: 'Good', easy: 'Easy' }[g];
    return `<button class="grade-btn ${g}" data-g="${g}"><span class="gl">${label}</span><span class="gi">${fmtInt(prev.interval)}</span></button>`;
  };
  const s = $screen();
  s.innerHTML = `
    <div class="review">
      <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
      <div class="rev-meta">${done} done &middot; ${remaining} left</div>
      <div class="rev-card" data-reveal tabindex="0" role="button" aria-label="Show answer">
        <div class="rev-prompt">${promptHtml}</div>
        <div class="rev-answer" hidden><div class="rev-divider"></div><div class="rev-answer-body">${answerHtml}</div></div>
        <div class="rev-hint" data-hint>Tap to reveal</div>
      </div>
    </div>
    <div class="grade-bar" hidden>
      ${gradeBtn('again')}${gradeBtn('hard')}${gradeBtn('good')}${gradeBtn('easy')}
    </div>`;

  const ansEl = s.querySelector('.rev-answer');
  const hintEl = s.querySelector('[data-hint]');
  const gradeBar = s.querySelector('.grade-bar');
  let revealed = false;
  const doReveal = () => {
    if (revealed) return;
    revealed = true; ansEl.hidden = false; hintEl.hidden = true; gradeBar.hidden = false;
    if (session.view) session.view.revealed = true;
  };
  s.querySelector('[data-reveal]').addEventListener('click', doReveal);
  s.querySelectorAll('.grade-btn').forEach(b =>
    b.addEventListener('click', e => { e.stopPropagation(); grade(item, card, b.dataset.g); }));

  session.view = { revealed: false, doReveal,
    doGrade: g => { if (!revealed) { doReveal(); return; } grade(item, card, g); } };
}
async function grade(item, card, g){
  const now = Date.now();
  const before = item.interval;
  const updated = schedule(item, g, now);
  await dbPut('items', updated);
  await dbPut('reviews', { id: uid(), itemId: item.id, cardId: card.id, deckId: card.deckId,
    grade: g, at: now, before, after: updated.interval });

  session.reviewed++;
  session.queue.shift();
  // Keep short-term (learning/relearning) cards in this session.
  if (updated.state === 'learning' || updated.state === 'relearning')
    session.queue.splice(Math.min(session.queue.length, 2), 0, item.id);

  screenReview(session.deckId, session.mode);
}

  setTopbar({ title: '', back: '/deck/' + deck.id });

async function doExport(){
  const data = await exportData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const d = new Date();
  const stamp = `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}`;
  const a = document.createElement('a');
  a.href = url; a.download = `flashcards-${stamp}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Exported');
}
async function doImport(file){
  if (!file) return;
  let data;
  try { data = JSON.parse(await file.text()); }
  catch { toast('Invalid JSON'); return; }
  if (!data || !Array.isArray(data.decks) || !Array.isArray(data.cards)) { toast('Unrecognized file'); return; }
  if (!(await showConfirm({ title: 'Import data?', message: 'This replaces all current decks and cards.', ok: 'Import', danger: true }))) return;
  await importData(data); toast('Imported'); go('/decks');
}
async function doClear(){
  if (!(await showConfirm({ title: 'Clear all data?', message: 'All decks, cards, and history will be permanently deleted.', ok: 'Delete everything', danger: true }))) return;
  await clearAll(); toast('Cleared'); go('/decks');

/* ============================ RENDER LOOP ============================ */
async function render(){
  const route = parseRoute();
  if (route.name !== 'review') session = null; // leaving review discards the queue
  try {
    switch (route.name) {
      case 'decks':    await screenDecks(); break;
      case 'deck':     await screenDeck(route.deckId); break;
      case 'editor':   await screenEditor(route.deckId, route.cardId); break;
      case 'review':   await screenReview(route.deckId, route.mode); break;
      case 'settings': await screenSettings(); break;
      default:         screenNotFound();
    }
    $screen().scrollTop = 0;
  } catch (err) {
    console.error(err);
    toast('Something went wrong');
  }
}
function onKey(e){
  const r = parseRoute();
  if (r.name !== 'review' || !session || !session.view) return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const v = session.view;
  if (!v.revealed) {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); v.doReveal(); }
    return;
  }
  const map = { '1': 'again', '2': 'hard', '3': 'good', '4': 'easy' };
  if (map[e.key]) { e.preventDefault(); v.doGrade(map[e.key]); }
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); v.doGrade('good'); }
}

/* ============================ INIT ============================ */
(function init(){
  window.addEventListener('hashchange', render);
  document.addEventListener('keydown', onKey);
  if (!location.hash) history.replaceState(null, '', '#/decks');
  render();
})();
</script>
</body>
